<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
   xmlns:cc="http://creativecommons.org/ns#"
   xmlns:dc="http://purl.org/dc/elements/1.1/"
   width="32"
   height="32"
   viewBox="0 0 32 32"
   version="1.1"
   id="svg-artic-favicon"
   sodipodi:docname="artic_favicon.svg"
   inkscape:version="1.2">
  <sodipodi:namedview
     id="namedview-favicon"
     pagecolor="#ffffff"
     bordercolor="#666666"
     borderopacity="1.0"
     inkscape:pageopacity="1.0"
     inkscape:pageshadow="2"
     inkscape:zoom="16"
     inkscape:cx="16"
     inkscape:cy="16"
     inkscape:document-units="px"
     inkscape:current-layer="layer-favicon"
     showgrid="false" />
  <defs
     id="defs-favicon" />
  <metadata
     id="metadata-favicon">
    <rdf:RDF>
      <cc:Work rdf:about="">
        <dc:format>image/svg+xml</dc:format>
        <dc:type rdf:resource="http://purl.org/dc/dcmitype/StillImage" />
        <dc:title>Artic favicon</dc:title>
        <dc:description>Simplified crystal icon for browser tab favicon. Uses prefers-color-scheme to adapt to light/dark browser themes.</dc:description>
      </cc:Work>
    </rdf:RDF>
  </metadata>
  <style
     id="favicon-style">
    /* Adapts to browser tab color scheme automatically */
    .crystal-stroke { stroke: #3C4F65; }
    @media (prefers-color-scheme: dark) {
      .crystal-stroke { stroke: #ffffff; }
    }
  </style>
  <g
     inkscape:label="Favicon"
     inkscape:groupmode="layer"
     id="layer-favicon"
     transform="translate(16,16)">
    <g
       id="group-main-arms"
       inkscape:label="Main arms"
       class="crystal-stroke"
       fill="none"
       stroke-width="2.2"
       stroke-linecap="round">
      <line x1="0" y1="-12" x2="0" y2="12" id="arm-vertical" />
      <line x1="-10.4" y1="-6" x2="10.4" y2="6" id="arm-diag1" />
      <line x1="-10.4" y1="6" x2="10.4" y2="-6" id="arm-diag2" />
    </g>
    <g
       id="group-branches"
       inkscape:label="Branches"
       class="crystal-stroke"
       fill="none"
       stroke-width="1.6"
       stroke-linecap="round">
      <line x1="0" y1="-7" x2="-3" y2="-10" id="b-top-l" />
      <line x1="0" y1="-7" x2="3" y2="-10" id="b-top-r" />
      <line x1="0" y1="7" x2="-3" y2="10" id="b-bot-l" />
      <line x1="0" y1="7" x2="3" y2="10" id="b-bot-r" />
      <line x1="6" y1="-3.5" x2="8.5" y2="-1.5" id="b-ur-d" />
      <line x1="6" y1="-3.5" x2="4" y2="-6" id="b-ur-u" />
      <line x1="-6" y1="3.5" x2="-8.5" y2="1.5" id="b-ll-u" />
      <line x1="-6" y1="3.5" x2="-4" y2="6" id="b-ll-d" />
      <line x1="-6" y1="-3.5" x2="-8.5" y2="-1.5" id="b-ul-d" />
      <line x1="-6" y1="-3.5" x2="-4" y2="-6" id="b-ul-u" />
      <line x1="6" y1="3.5" x2="8.5" y2="1.5" id="b-lr-u" />
      <line x1="6" y1="3.5" x2="4" y2="6" id="b-lr-d" />
    </g>
    <polygon
       id="center-hexagon"
       inkscape:label="Orange center"
       points="0,-3.5 3,-1.75 3,1.75 0,3.5 -3,1.75 -3,-1.75"
       fill="#F0581A"
       stroke="none" />
  </g>
</svg>
